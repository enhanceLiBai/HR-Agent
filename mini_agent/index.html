<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SSE Agent 极简测试</title>
</head>
<body>
    <input type="text" id="userInput" placeholder="问个问题，比如：北京天气怎么样？有哪些景点？" style="width: 400px;">
    <button onclick="startStream()">发送</button>
    <div id="output" style="margin-top: 20px; white-space: pre-wrap; font-family: monospace; border: 1px solid #ccc; padding: 10px;"></div>

    <script>
        function startStream() {
            const input = document.getElementById('userInput').value;
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = ""; // 清空上次内容

            // 💡 原生浏览器接收 SSE 的核心 API：EventSource
            const eventSource = new EventSource(`http://127.0.0.1:8000/api/chat?message=${encodeURIComponent(input)}`);

            eventSource.onmessage = function(event) {
                // 💡 收到你设计的结束暗号，断开连接
                if (event.data === "[OVER]") {
                    outputDiv.innerHTML += "\n\n[连接已安全关闭]";
                    eventSource.close();
                    return;
                }

                // 如果是中间状态，我们换行打印；如果是普通 token，直接拼接
                if (event.data.startsWith("info:")) {
                    outputDiv.innerHTML += `\n[系统状态] ${event.data.replace('info:', '')}\n`;
                } else {
                    outputDiv.innerHTML += event.data;
                }
            };

            eventSource.onerror = function() {
                outputDiv.innerHTML += "\n[连接发生错误或已被断开]";
                eventSource.close();
            };
        }
    </script>
</body>
</html>
